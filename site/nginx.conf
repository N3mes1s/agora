# Use Railway's X-Forwarded-For header to get the real client IP
set_real_ip_from 100.64.0.0/10;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Agora website nginx config
# Serves static HTML + agent-discovery assets + bot classification logging

# User-agent → class map (http context level)
map $http_user_agent $agent_class {
    default                    human;
    ~*GPTBot                   ai-gptbot;
    ~*OAI-SearchBot            ai-oai-search;
    ~*ChatGPT-User             ai-chatgpt-user;
    ~*ClaudeBot                ai-claudebot;
    ~*Claude-User              ai-claude-user;
    ~*Claude-SearchBot         ai-claude-search;
    ~*anthropic-ai             ai-anthropic;
    ~*PerplexityBot            ai-perplexity;
    ~*Perplexity-User          ai-perplexity-user;
    ~*Google-Extended          ai-google-extended;
    ~*Bytespider               ai-bytespider;
    ~*CCBot                    ai-ccbot;
    ~*Amazonbot                ai-amazonbot;
    ~*meta-externalagent       ai-meta;
    ~*cohere                   ai-cohere;
    ~*Applebot-Extended        ai-applebot;
    ~*Googlebot                bot-googlebot;
    ~*Bingbot                  bot-bingbot;
    ~*DuckDuckBot              bot-duckduckbot;
    ~*YandexBot                bot-yandexbot;
    ~*Baiduspider              bot-baiduspider;
    ~*facebookexternalhit      bot-facebook;
    ~*Twitterbot               bot-twitter;
    ~*LinkedInBot              bot-linkedin;
    ~*Slackbot                 bot-slack;
    ~*Discordbot               bot-discord;
    ~*curl                     bot-curl;
    ~*wget                     bot-wget;
    ~*Python-requests          bot-python-requests;
    ~*Go-http-client           bot-go-http;
}

# Log format with agent classification + crawler IP verification
# verified=yes means the IP matches a published AI crawler range
# verified=no means the IP doesn't match — could be a spoofed bot
log_format agora '$remote_addr [$http_x_forwarded_for] - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'class=$agent_class verified=$crawler_verified';

server {
    listen 8080;
    root /usr/share/nginx/html;
    access_log /dev/stdout agora;
    access_log /var/log/nginx/access.log agora;

    # HTML pages
    location / {
        default_type text/html;
    }

    # Agent-discovery assets with correct content types
    location = /install { default_type text/plain; }
    location = /llms.txt { default_type text/plain; }
    location = /robots.txt { default_type text/plain; }
    location = /AGENTS.md { default_type text/plain; }
    location = /sitemap.xml { default_type application/xml; }
    location = /openapi.yaml { default_type application/yaml; }
    location = /mcp-server.json { default_type application/json; }
    location ~ \.json$ { default_type application/json; }
    location ~ \.svg$ { default_type image/svg+xml; }
    location /.well-known/ { default_type application/json; }
}
